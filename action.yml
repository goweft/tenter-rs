name: "Tenter Scan (Rust)"
description: "Pre-publish artifact integrity scanner. Static binary, no Python required. Catches source maps, secrets, and debug artifacts."
author: "goweft"

branding:
  icon: "shield"
  color: "blue"

inputs:
  target:
    description: "Path to scan (directory, tarball, or wheel)"
    required: false
    default: "."
  format:
    description: "Output format: human, json, or sarif"
    required: false
    default: "sarif"
  fail-on:
    description: "Minimum severity to fail: critical, high, medium, low, info"
    required: false
    default: "high"
  version:
    description: "tenter-rs version to download (default: latest)"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install tenter binary
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -fsSL https://api.github.com/repos/goweft/tenter-rs/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        fi
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "Unsupported arch: $ARCH" && exit 1 ;;
        esac
        BIN="tenter-${OS}-${ARCH}"
        URL="https://github.com/goweft/tenter-rs/releases/download/v${VERSION}/${BIN}"
        echo "Downloading tenter v${VERSION} for ${OS}/${ARCH}"
        curl -fsSL "$URL" -o /usr/local/bin/tenter
        chmod +x /usr/local/bin/tenter
        tenter --version

    - name: Run tenter scan
      id: scan
      shell: bash
      run: |
        set +e
        FORMAT="${{ inputs.format }}"
        if [ "$FORMAT" = "sarif" ]; then EXT="sarif"; else EXT="txt"; fi
        tenter scan "${{ inputs.target }}" \
          --format "$FORMAT" \
          --fail-on "${{ inputs.fail-on }}" \
          > "tenter-results.${EXT}"
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF results
      if: always() && inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: tenter-results.sarif
      continue-on-error: true

    - name: Check exit code
      shell: bash
      run: |
        CODE="${{ steps.scan.outputs.exit_code }}"
        exit "${CODE:-0}"
