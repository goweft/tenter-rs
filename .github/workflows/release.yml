name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            bin: tenter
            asset: tenter-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            bin: tenter
            asset: tenter-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            bin: tenter
            asset: tenter-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: tenter
            asset: tenter-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: tenter.exe
            asset: tenter-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (musl targets)
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: "!contains(matrix.target, 'linux-musl')"
        run: cargo build --release --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"

      - name: Build (cross, musl)
        if: contains(matrix.target, 'linux-musl')
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
