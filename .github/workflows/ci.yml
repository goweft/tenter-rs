name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux-musl')
        uses: taiki-e/install-action@cross

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Build (native)
        if: "!contains(matrix.target, 'linux-musl')"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross, musl)
        if: contains(matrix.target, 'linux-musl')
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests (native only)
        if: "!contains(matrix.target, 'linux-musl') && !contains(matrix.target, 'aarch64')"
        run: cargo test --release --target ${{ matrix.target }}

      - name: Verify binary is static (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          BIN="target/${{ matrix.target }}/release/tenter"
          file "$BIN"
          # Match both "statically linked" (older Rust/file) and
          # "static-pie linked" (newer Rust with PIE enabled).
          # Both are fully static — no dynamic linker, no glibc dependency.
          file "$BIN" | grep -qE "static(ally|-pie) linked" || \
            { echo "ERROR: binary is not statically linked"; exit 1; }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tenter${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

  self-scan:
    name: Self-scan (eat our own dog food)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: tenter-x86_64-unknown-linux-musl
          path: /usr/local/bin/

      - name: Make executable
        run: chmod +x /usr/local/bin/tenter

      - name: Scan this repo
        run: tenter scan . --format sarif --fail-on high > tenter.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tenter.sarif
        continue-on-error: true
