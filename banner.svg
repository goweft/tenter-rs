  <!-- === RIGHT TEXT === -->
  <g transform="translate(660, 150)">
    <text font-family="Inter, -apple-system, system-ui, sans-serif" font-size="82" font-weight="700" fill="#2a2a2a" letter-spacing="-2">tenter</text>
    <text y="70" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="#4a4a4a">pre-publish artifact scanner</text>
    <text y="140" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="21" font-weight="400" fill="#888880">scan what ships, not what's committed</text>
    <text y="172" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="21" font-weight="400" fill="#888880">secrets · source maps · debug artifacts</text>
    <text y="210" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="400" fill="#aaa8a0">static binary · rust · sarif · github action</text>
    <text y="240" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" font-weight="400" fill="#b5a8a0">v2 — rust rewrite</text>
